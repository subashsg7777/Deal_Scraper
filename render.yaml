services:
  - type: web
    name: deal-scrapper-backend
    runtime: docker
    rootDir: backend/Deal_Scrapper
    plan: free
    autoDeploy: true
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: deal_scrapper
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://deal-scraper.vercel.app,http://localhost:5173,http://127.0.0.1:5173
